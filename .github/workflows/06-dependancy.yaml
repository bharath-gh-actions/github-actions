name: Dependency # Name of your workflow

on: [push] # The event that triggers the workflow

jobs:
  # job-1 and job-4 will run in parallel as they don't have any dependencies
  job-1: # The ID of the job
    runs-on: ubuntu-latest # The runner environment
    steps:
      - name: step1 # Name of the first step
        run: echo "Hi, I am from job 1"
      
  job-2:
    needs: job-1 # This job will run after job-1 is completed
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: echo "Hi, I am from job 2"

  job-3:
    needs: job-2 # This job will run after job-2 is completed
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: echo "Hi, I am from job 3"

  job-4:
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: echo "Hi, I am from job 4"