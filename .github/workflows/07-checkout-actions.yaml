name: Checkout Code # Name of your workflow

on: [push] # The event that triggers the workflow

jobs: 
  build: # The ID of the job
    runs-on: ubuntu-latest # The runner environment
    steps:
    # checkout will happen here and the code will be available for the next steps
      - name: checkout # Name of the first step
        uses: actions/checkout@v6 # Action to checkout the code

      - name: display files # Name of the second step
        run: ls -la # List the files in the repository to verify that the code is checked out