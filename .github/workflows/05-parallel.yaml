name: Parallel # Name of your workflow

on: [push] # The event that triggers the workflow

jobs: 
  job-1: # The ID of the job
    runs-on: ubuntu-latest # The runner environment
    steps:
      - name: step1 # Name of the first step
        run: echo "Hi, I am from job 1"
      
  job-2:
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: echo "Hi, I am from job 2"

  job-3:
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: echo "Hi, I am from job 3"